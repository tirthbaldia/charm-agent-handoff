name: JSON/YAML Lint

on:
  push:
  pull_request:

jobs:
  lint-json-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          find . -name '*.json' -type f -print0 | while IFS= read -r -d '' f; do
            jq empty "$f"
          done

      - name: Validate YAML
        run: |
          python3 -m pip install --upgrade pip yamllint
          yamllint -d '{extends: default, rules: {line-length: disable}}' .
